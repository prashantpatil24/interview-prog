<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Center Div</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: Arial, sans-serif;
    }

    #root {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    #root-child {
        width: 200px;
        height: 200px;
        background: #eee;
        border: 1px solid #ccc;
    }
</style>
</head>

<body>

<div id="root">
    <div id="root-child"></div>
</div>

</body>
</html>
